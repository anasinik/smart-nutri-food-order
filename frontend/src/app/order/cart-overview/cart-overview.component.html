<ng-container *ngIf="cartItems.length > 0; else emptyCart">
  <mat-card class="cart-card">
    <mat-card-title>Your Cart</mat-card-title>

    <div class="cart-table-wrapper">
      <table mat-table [dataSource]="cartItems" class="mat-elevation-z8">

        <!-- Meal Name Column -->
        <ng-container matColumnDef="mealName">
          <th mat-header-cell *matHeaderCellDef>Meal</th>
          <td mat-cell *matCellDef="let item">{{ item.mealName }}</td>
        </ng-container>

        <!-- Quantity Column -->
        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Quantity</th>
          <td mat-cell *matCellDef="let item">{{ item.quantity }}</td>
        </ng-container>

        <!-- Price Column -->
        <ng-container matColumnDef="price">
          <th mat-header-cell *matHeaderCellDef>Price per item</th>
          <td mat-cell *matCellDef="let item">{{ item.price | currency }}</td>
        </ng-container>

        <!-- Total Column -->
        <ng-container matColumnDef="total">
          <th mat-header-cell *matHeaderCellDef>Total</th>
          <td mat-cell *matCellDef="let item">{{ (item.price * item.quantity) | currency }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- Footer for total -->
        <tr class="mat-footer-row">
          <td colspan="3" class="footer-label"><strong>Total</strong></td>
          <td class="footer-value"><strong>{{ totalPrice | currency }}</strong></td>
        </tr>
      </table>
    </div>

    <div class="order-button-container">
      <button mat-raised-button color="primary" (click)="openCheckoutDialog()">
        Place Order
      </button>
    </div>
  </mat-card>
</ng-container>

<ng-template #emptyCart>
  <mat-card class="empty-cart-card">
    <mat-card-content class="empty-cart">
      <mat-icon class="empty-cart-icon">remove_shopping_cart</mat-icon>
      <p>Your cart is empty.</p>
    </mat-card-content>
  </mat-card>
</ng-template>
