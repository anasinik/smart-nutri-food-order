<!-- Floating FAB + helper text -->
<div class="chat-fab-container" (click)="toggleChat()">
  <div class="helper-text">
    Don't know what to eat? Ask for a smart suggestion!
  </div>
  <button mat-fab color="primary">
    <mat-icon>restaurant_menu</mat-icon>
  </button>
</div>

<!-- Chat panel popup -->
<mat-card *ngIf="showChat" class="chat-panel">
  <mat-card-header>
    <mat-card-title>Meal Suggestion Helper 🍴</mat-card-title>
    <button mat-icon-button (click)="toggleChat()">
      <mat-icon>close</mat-icon>
    </button>

  </mat-card-header>

  <mat-card-content class="chat-messages">
    <div *ngFor="let msg of messages" [ngClass]="msg.from">{{ msg.text }}</div>
  </mat-card-content>

  <mat-card-actions>
    <mat-form-field>
      <input matInput placeholder="What would you like to eat?" [(ngModel)]="newMessage">
    </mat-form-field>
    <button mat-icon-button color="primary" (click)="sendMessage()">
      <mat-icon>send</mat-icon>
    </button>

  </mat-card-actions>
</mat-card>
