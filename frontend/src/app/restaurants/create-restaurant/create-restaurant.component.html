<form [formGroup]="restaurantForm" (ngSubmit)="onSubmit()" class="apple-form">

  <!-- LEFT: PHOTO -->
  <div class="photo-col">
    <div class="photo-preview" *ngIf="previewUrl; else placeholder">
      <img [src]="previewUrl" alt="Restaurant photo" />
    </div>

    <ng-template #placeholder>
      <div class="photo-placeholder">
        <span>No photo</span>
      </div>
    </ng-template>

    <input type="file" accept="image/*" (change)="onFileSelected($event)" hidden #fileInput>
    <button type="button" class="upload-btn" (click)="fileInput.click()">
      Upload Photo
    </button>
  </div>

  <!-- RIGHT: INPUTS -->
  <div class="fields-col">

    <label class="field">
      <span>Name</span>
      <input formControlName="name" placeholder="The Green Spoon">
    </label>

    <label class="field">
      <span>Address</span>
      <input formControlName="address" placeholder="123 Main Street">
    </label>

    <label class="field">
      <span>Phone Number</span>
      <input formControlName="phoneNumber" placeholder="+381 65 123 4567">
    </label>

    <label class="field">
      <span>Manager Username</span>
      <input formControlName="managerUsername" placeholder="peraperic">
    </label>

  </div>

  <!-- DESCRIPTION FULL WIDTH -->
  <div class="description-row">
    <label class="field full">
      <span>Description</span>
      <textarea formControlName="description" placeholder="Short description"></textarea>
    </label>
  </div>

  <!-- SUBMIT -->
  <button type="submit" class="submit-btn" [disabled]="restaurantForm.invalid">
    Create restaurant
  </button>

</form>
